version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22

    commands:
      - echo Installing dependencies
      - npm ci

  build:
    commands:
      - echo Building Next.js app
      - npm run build

# CodeBuild omits gitignored paths from the default artifact zip; .next/ is gitignored but required on the server.
artifacts:
  files:
    - "**/*"
    - ".next/**/*"
